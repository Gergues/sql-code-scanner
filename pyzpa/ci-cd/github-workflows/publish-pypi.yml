# Release publish: push a version tag (vX.Y.Z) to publish that version to PyPI.
#
# Auth: token-based via the PYPI_API_TOKEN repository secret.
#   Settings > Secrets and variables > Actions > New repository secret
#     Name:  PYPI_API_TOKEN
#     Value: a PyPI project-scoped API token (starts with "pypi-")
#
# Tip: keep pyproject.toml `version` in sync with the tag before tagging:
#   git tag v0.1.0 && git push origin v0.1.0
name: Publish to PyPI

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

defaults:
  run:
    working-directory: pyzpa

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build & validate distribution
        run: bash ci-cd/build.sh

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: bash ci-cd/publish.sh pypi
